# DO NOT EDIT -- overwritten on every update.
#
# Agent customization surface for agent-archon.
# Team overrides:     {project-root}/_bmad/custom/agent-archon.toml
# Personal overrides: {project-root}/_bmad/custom/agent-archon.user.toml

[agent]

# --- Metadata (install-time roster contract) ---
# Consumed by module.yaml:agents[] and `[agents.<code>]` in central config.

code = "archon"
name = "Archon"
title = "Корпоративный архитектор банка"
icon = "🏛️"
description = "Седой стратег корпоративной архитектуры, вписывает инициативы в утверждённую целевую архитектуру банка и не пропускает дрейфа от неё."
agent_type = "stateless"

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append
#   arrays-of-tables with `code`/`id`: replace matching items, append new ones.

# Steps to run before standard activation (config load, greet).
# Overrides append. Use for pre-flight loads, compliance pre-checks, etc.

activation_steps_prepend = []

# Steps to run after greet but before the agent accepts user input.
# Overrides append. Use for context-heavy setup after acknowledgement.

activation_steps_append = []

# Persistent facts kept in mind for the whole session (org rules, domain
# constants, user preferences). Overrides append.
#
# Each entry is either:
#   - a literal sentence, e.g. "Наш банк — только on-prem для систем Tier-1."
#   - a `file:` reference: "file:{project-root}/docs/standards.md"
#     (globs supported; contents are loaded and treated as facts).

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# --- Bank knowledge sources (loaded as session context on activation) ---

# Реестр систем банка: Core Banking, CRM, Digital Banking, DWH/Data Lake,
# платежные платформы, микросервисы, интеграционные платформы (ESB/Event Hub/
# API Gateway). Желательно структурированный (YAML/JSON/CSV) с владельцами и
# статусами. Markdown тоже допустим.
landscape_registry_path = "{project-root}/docs/landscape/registry.yaml"

# Утверждённая целевая архитектура банка — красная нить любого суждения.
target_architecture_path = "{project-root}/docs/architecture/target.md"

# Архитектурные принципы и стандарты банка (TOGAF-style principles,
# guardrails, обязательные паттерны).
architecture_principles_path = "{project-root}/docs/architecture/principles.md"

# Регуляторный корпус: 152-ФЗ, 115-ФЗ, PCI DSS, GDPR и внутренние политики.
# Может быть директорией — Archon загрузит релевантное по запросу.
compliance_corpus_path = "{project-root}/docs/compliance/"

# Стратегия развития банка 3–5 лет, операционная модель, цифровая
# трансформация, roadmap'ы ключевых доменов. Загружается по требованию.
strategy_path = "{project-root}/docs/strategy.md"

# --- Output destination ---

# Куда писать отчёты (consultation, adversarial review, compliance audit,
# landscape drift scan). Должен быть писаемой директорией.
assessment_output_path = "{project-root}/_bmad-output/archon/"

# --- Hooks ---

# Команда или промпт, исполняемые после завершения оценки/ревью.
# Например: уведомить ARB, открыть тикет в Jira, обновить дашборд.
# Пусто = ничего не делать.
on_assessment_complete = ""
